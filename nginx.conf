# Adega - SaaS TV Manager
# Nginx reverse proxy (dev/local; em produção usar Coolify/Traefik)

upstream backend {
    server backend:3001;
}

upstream frontend {
    server frontend:3002;
}

# ── Cliente: adega.queroservico.com.br ──
server {
    listen 80;
    server_name adega.queroservico.com.br;

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
    }

    location /uploads/ {
        alias /app/uploads/;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── TV: tv.adega.queroservico.com.br ──
server {
    listen 80;
    server_name tv.adega.queroservico.com.br;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── Admin: admin.adega.queroservico.com.br ──
server {
    listen 80;
    server_name admin.adega.queroservico.com.br;

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
