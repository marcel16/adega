services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adega
      POSTGRES_USER: adega
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adega_secret}
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U adega
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
    - redis_data:/data
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://adega:${DB_PASSWORD:-adega_secret}@db:5432/adega
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_ENVIRONMENT: ${ASAAS_ENVIRONMENT:-sandbox}
      UPLOAD_DIR: /app/uploads
      FFMPEG_PATH: /usr/bin/ffmpeg
      PUBLIC_URL: https://adega.queroservico.com.br
      TV_URL: https://tv.adega.queroservico.com.br
      ADMIN_URL: https://admin.adega.queroservico.com.br
    volumes:
    - uploads:/app/uploads
    labels:
    - traefik.enable=true
    - traefik.http.routers.adega-tv.rule=Host(`tv.adega.queroservico.com.br`)
    - traefik.http.routers.adega-tv.entrypoints=https
    - traefik.http.routers.adega-tv.tls.certresolver=letsencrypt
    - traefik.http.services.adega-tv.loadbalancer.server.port=3001
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
    - backend
    environment:
      NEXT_PUBLIC_API_URL: https://adega.queroservico.com.br/api
      NEXT_PUBLIC_TV_URL: https://tv.adega.queroservico.com.br
      HOSTNAME: 0.0.0.0
    labels:
    - traefik.enable=true
    - traefik.docker.network=coolify
    - traefik.http.routers.adega-web.rule=Host(`adega.queroservico.com.br`) || Host(`admin.adega.queroservico.com.br`)
    - traefik.http.routers.adega-web.entrypoints=https
    - traefik.http.routers.adega-web.tls.certresolver=letsencrypt
    - traefik.http.services.adega-web.loadbalancer.server.port=3002
volumes:
  pgdata: null
  redis_data: null
  uploads: null
networks:
  default:
    name: coolify
    external: true
