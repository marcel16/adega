version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adega
      POSTGRES_USER: adega
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adega_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adega"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://adega:${DB_PASSWORD:-adega_secret}@db:5432/adega
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_ENVIRONMENT: ${ASAAS_ENVIRONMENT:-sandbox}
      UPLOAD_DIR: /app/uploads
      FFMPEG_PATH: /usr/bin/ffmpeg
      PUBLIC_URL: https://adega.queroservico.com.br
      TV_URL: https://tv.adega.queroservico.com.br
      ADMIN_URL: https://admin.adega.queroservico.com.br
    volumes:
      - uploads:/app/uploads
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://adega.queroservico.com.br/api
      NEXT_PUBLIC_TV_URL: https://tv.adega.queroservico.com.br

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro

volumes:
  pgdata:
  redis_data:
  uploads:
